# Retrieval golden set (plan Phase 1 task 6, Gap 4).
# A living, labeled set of question -> expected pattern/source used by
# tests/test_golden.py to assert retrieval quality has ground truth.
#
# Coverage: one case per pattern heading in data/patterns_seed.yaml (78 patterns)
# plus 4 alternate-phrasing cases that test retrieval robustness.
#
# Rules:
#   - `expected_heading` MUST match a `heading` field in data/patterns_seed.yaml.
#   - Questions are phrased as a developer/architect would naturally ask them,
#     NOT copied verbatim from the pattern text (tests genuine semantic search).
#   - Add entries here whenever a new pattern is added to patterns_seed.yaml.

cases:

  # ── Scalability ─────────────────────────────────────────────────────────────

  - question: "How do I bulkify Apex so a trigger processes a collection of records with one SOQL and one DML instead of per record?"
    expected_heading: "Bulkification"
    expected_pillar: Scalability

  - question: "Should I have multiple triggers on the same object?"
    expected_heading: "One Trigger Per Object"
    expected_pillar: Scalability

  - question: "Why does my trigger fail when 200 records are inserted at once?"
